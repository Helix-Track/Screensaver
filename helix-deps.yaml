# helix-deps.yaml — screensaver Submodule-Dependency Manifest (HelixConstitution §11.4.31)
# Catalogue-Check (§11.4.74): inspected README.md, Recipes/install.sh, Recipes/prepare.sh,
#   Upstreams/GitHub.sh (§6.W: Gitee/GitFlic retired), Version/version.sh, and the absence of any
#   ecosystem manifest (no go.mod / package.json / build.gradle / Package.swift /
#   Cargo.toml / pom.xml) and any repo-local .gitmodules.
#   This is a Mate-desktop screensaver: an SVG asset (helixtrack.svg) + a .desktop
#   launcher + plain POSIX-sh install/prepare recipes. No code-level git dependency is
#   consumed. The README references red-elf/Software-Toolkit only as an OPTIONAL
#   host-side build-toolkit the operator clones to obtain `initialize.sh`; it is NOT
#   imported, fetched, or submoduled by this repo, so it is not a consumed dependency.
#   own-org git/submodule deps: NONE.
schema_version: 1
deps: []
transitive_handling:
  recursive: true
  conflict_resolution: operator-required
language_specific_subtree: false
